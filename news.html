<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News - Real Life International</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fff; /* white background for readability */
  line-height: 1.7;
  color: #000; /* default text black */
}

header {
  background: #b30000; /* dark red */
  color: white;
  padding: 25px;
  text-align: center;
}

nav {
  background: #000; /* black nav bar */
  padding: 10px 0;
  text-align: center;
}

nav a {
  color: #fff; /* white text */
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
}

nav a:hover {
  color: #ff3333; /* bright red on hover */
  text-decoration: underline;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h2 {
  color: #b30000; /* dark red headings */
  margin-top: 30px;
}

p {
  margin-bottom: 15px;
  color: #000; /* black text */
}

footer {
  background: #000; /* black footer */
  color: #fff;
  text-align: center;
  padding: 15px;
  margin-top: 40px;
}

/* Optional: buttons or links inside content */
.read-btn, button {
  background: #b30000; /* dark red */
  color: #fff;
  padding: 6px 12px;
  border-radius: 4px;
  border: none;
  text-decoration: none;
  cursor: pointer;
}

.read-btn:hover, button:hover {
  background: #ff3333; /* bright red hover */
}
</style>

<body>

<header>
<h1>Real Life International</h1>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="news.html">News</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section>
<h2>Latest News</h2>
<div class="fb-page"
data-href="https://www.facebook.com/RealLifeinternational"
data-tabs="timeline"
data-width="500"
data-height="800"
data-small-header="false"
data-adapt-container-width="true"
data-hide-cover="false"
data-show-facepile="true">
</div>
</section>

<div id="fb-root"></div>
<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0">
</script>

<footer>
<p>© 2026 Real Life International</p>
</footer>

</body>
</html>
